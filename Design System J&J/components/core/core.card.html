<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:28px 30px;}
  .group{margin-bottom:24px;}
  .glabel{font-size:var(--text-overline);font-weight:var(--fw-bold);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-faint);margin-bottom:12px;}
  .rowx{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Badge, Card, Avatar } = window.DesignSystemJJ_a7a2a8;
  function Demo(){
    return (
      <div>
        <div className="group">
          <div className="glabel">Buttons — variants</div>
          <div className="rowx">
            <Button variant="accent">Book a free chat</Button>
            <Button variant="primary">See our work</Button>
            <Button variant="secondary">Learn more</Button>
            <Button variant="ghost" iconRight={<span>→</span>}>Skip</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
        </div>
        <div className="group">
          <div className="glabel">Buttons — sizes</div>
          <div className="rowx">
            <Button variant="primary" size="sm">Small</Button>
            <Button variant="primary" size="md">Medium</Button>
            <Button variant="primary" size="lg">Large</Button>
          </div>
        </div>
        <div className="group">
          <div className="glabel">Badges</div>
          <div className="rowx">
            <Badge variant="brand">Web design</Badge>
            <Badge variant="accent">New</Badge>
            <Badge variant="success" dot>Live</Badge>
            <Badge variant="warning">In progress</Badge>
            <Badge variant="neutral">Draft</Badge>
          </div>
        </div>
        <div className="group" style={{marginBottom:0}}>
          <div className="glabel">Cards &amp; Avatars</div>
          <div className="rowx" style={{alignItems:'stretch'}}>
            <Card padding="md" style={{maxWidth:'240px'}}>
              <h4 style={{margin:'0 0 6px'}}>Fast, friendly sites</h4>
              <p style={{margin:0,fontSize:'15px',color:'var(--text-muted)'}}>White surface, hairline border, soft shadow.</p>
            </Card>
            <Card tone="brand" padding="md" style={{maxWidth:'200px',display:'flex',alignItems:'center',gap:'12px'}}>
              <Avatar name="Jakob M" size="md" />
              <Avatar name="Jakob R" size="md" />
              <span style={{fontWeight:600}}>Brand tone</span>
            </Card>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>

</html>
