<!-- @dsCard group="Components" viewport="700x460" name="Forms — Input, Textarea, Select, Checkbox" subtitle="Friendly, low-friction lead-capture fields" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:28px 30px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 22px;max-width:640px;}
  .full{grid-column:1 / -1;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Textarea, Select, Checkbox } = window.DesignSystemJJ_a7a2a8;
  function Demo(){
    return (
      <div className="grid">
        <Input label="Your name" placeholder="Jane Smith" required />
        <Input label="Email" type="email" placeholder="you@business.com" hint="We reply within a day." />
        <Select className="full" label="What do you need?" placeholder="Choose one"
          options={['A brand-new website','A redesign of my current site','Just a refresh','Not sure yet']} />
        <Textarea className="full" label="Tell us about your project" rows={3}
          placeholder="What does your business do, and what's the site for?" />
        <Input className="full" label="Phone" error="Please enter a valid number." defaultValue="123" />
        <div className="full"><Checkbox label="Yes, send me the occasional tip for keeping my site fresh." defaultChecked /></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
