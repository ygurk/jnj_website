<style>
  html, body { height: 100%; margin: 0; }

    .jj-hero-grid, .jj-process-grid, .jj-testi-grid, .jj-faq-grid, .jj-contact-grid { grid-template-columns: 1fr !important; }

    .jj-ba-grid { grid-template-columns: 1fr !important; }
    .jj-ba-arrow { transform: rotate(90deg); margin: 0 auto; }
    .jj-form-row { grid-template-columns: 1fr !important; }
  }
