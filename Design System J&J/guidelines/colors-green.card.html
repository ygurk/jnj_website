<!-- @dsCard group="Colors" viewport="700x190" name="Pine green — primary" subtitle="Brand & interactive scale. 800 = brand, 600 = interactive" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);padding:24px;}
  .scale{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px 10px;}
  .sw b{font-size:11px;font-weight:700;letter-spacing:.02em;}
  .sw span{font-size:9.5px;opacity:.8;font-family:var(--font-mono);}
  .key{margin-top:14px;display:flex;gap:22px;font-size:12px;color:var(--text-muted);}
  .key b{color:var(--text-strong);}
</style></head><body>
  <div class="scale">
    <div class="sw" style="background:var(--green-50)"><b style="color:#16241D">50</b><span style="color:#3E463F">#EEF4F0</span></div>
    <div class="sw" style="background:var(--green-100)"><b style="color:#16241D">100</b><span style="color:#3E463F">#DEEBE4</span></div>
    <div class="sw" style="background:var(--green-200)"><b style="color:#16241D">200</b><span style="color:#3E463F">#C2DACE</span></div>
    <div class="sw" style="background:var(--green-300)"><b style="color:#16241D">300</b><span style="color:#16241D">#8FBFAB</span></div>
    <div class="sw" style="background:var(--green-400)"><b style="color:#fff">400</b><span style="color:#EEF4F0">#5BA084</span></div>
    <div class="sw" style="background:var(--green-600)"><b style="color:#fff">600</b><span style="color:#DEEBE4">#2E6B52</span></div>
    <div class="sw" style="background:var(--green-700)"><b style="color:#fff">700</b><span style="color:#DEEBE4">#265A47</span></div>
    <div class="sw" style="background:var(--green-800)"><b style="color:#fff">800</b><span style="color:#DEEBE4">#1F4D3D</span></div>
    <div class="sw" style="background:var(--green-900)"><b style="color:#fff">900</b><span style="color:#C2DACE">#14352A</span></div>
  </div>
  <div class="key"><span><b>800</b> Brand / headings / dark surfaces</span><span><b>600</b> Buttons, links, interactive</span></div>
</body></html>
