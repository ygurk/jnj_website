<!-- @dsCard group="Colors" viewport="700x190" name="Warm gold — accent" subtitle="CTA & highlights only — never body text. 500 = accent" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);padding:24px;}
  .scale{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px 10px;}
  .sw b{font-size:11px;font-weight:700;}
  .sw span{font-size:9.5px;opacity:.85;font-family:var(--font-mono);}
  .key{margin-top:14px;font-size:12px;color:var(--text-muted);}
  .key b{color:var(--text-strong);}
</style></head><body>
  <div class="scale">
    <div class="sw" style="background:var(--gold-50)"><b style="color:#5a4408">50</b><span style="color:#5a4408">#FDF8EC</span></div>
    <div class="sw" style="background:var(--gold-100)"><b style="color:#5a4408">100</b><span style="color:#5a4408">#FCF1DA</span></div>
    <div class="sw" style="background:var(--gold-200)"><b style="color:#5a4408">200</b><span style="color:#5a4408">#F9E6C2</span></div>
    <div class="sw" style="background:var(--gold-300)"><b style="color:#5a4408">300</b><span style="color:#5a4408">#F4D597</span></div>
    <div class="sw" style="background:var(--gold-400)"><b style="color:#5a4408">400</b><span style="color:#5a4408">#EFC36E</span></div>
    <div class="sw" style="background:var(--gold-500)"><b style="color:#3a2c06">500</b><span style="color:#3a2c06">#E7B24C</span></div>
    <div class="sw" style="background:var(--gold-600)"><b style="color:#fff">600</b><span style="color:#fff8ec">#D29A38</span></div>
    <div class="sw" style="background:var(--gold-700)"><b style="color:#fff">700</b><span style="color:#fdf8ec">#B8852A</span></div>
    <div class="sw" style="background:var(--gold-800)"><b style="color:#fff">800</b><span style="color:#fdf8ec">#9A6E1E</span></div>
  </div>
  <div class="key"><b>500</b> Primary CTA fill &amp; highlights · pair with green-900 text · <b>never</b> use as body text on light</div>
</body></html>
