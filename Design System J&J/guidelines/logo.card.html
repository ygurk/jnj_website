<!-- @dsCard group="Brand" viewport="700x300" name="Logo — lettermark" subtitle="J&J badge, horizontal lockup & wordmark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:34px;display:flex;flex-direction:column;gap:30px;}
  .row{display:flex;align-items:center;gap:40px;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;gap:10px;}
  .lbl{font-size:var(--text-overline);font-weight:var(--fw-bold);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-faint);}
  .ondark{background:var(--surface-brand);padding:22px 26px;border-radius:var(--radius-lg);}
  /* badge on dark variant: reuse svg but recolor not possible; show badge as-is */
</style>
</head>
<body>
  <div class="row">
    <div class="item"><span class="lbl">Badge / favicon</span><img src="../assets/logo-badge.svg" width="84" height="84" alt="J&amp;J badge"></div>
    <div class="item"><span class="lbl">Horizontal lockup</span><img src="../assets/logo-horizontal.svg" height="74" alt="J&amp;J Studios"></div>
  </div>
  <div class="row">
    <div class="item"><span class="lbl">Wordmark</span><img src="../assets/logo-wordmark.svg" height="46" alt="J&amp;J Studios wordmark"></div>
    <div class="item"><span class="lbl">On brand surface</span><div class="ondark"><img src="../assets/logo-badge.svg" width="60" height="60" alt="J&amp;J badge"></div></div>
  </div>
</body>
</html>
