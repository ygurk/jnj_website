<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation — shadows" subtitle="Warm green-tinted shadows, never gray/black" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:30px;display:flex;gap:26px;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;align-items:center;gap:11px;}
  .box{width:96px;height:70px;background:var(--surface-card);border-radius:var(--radius-lg);}
  .item span{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
  .item b{color:var(--text-strong);font-weight:600;}
</style></head><body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span><b>xs</b></span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span><b>sm</b></span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span><b>md</b> card</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span><b>lg</b> popover</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span><b>xl</b> modal</span></div>
</body></html>
