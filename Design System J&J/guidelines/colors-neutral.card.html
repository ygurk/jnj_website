<!-- @dsCard group="Colors" viewport="700x210" name="Warm neutrals — ink & paper" subtitle="Text, borders & surfaces. Cream paper, green-tinted ink" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);padding:24px;}
  .scale{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border-default);}
  .sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 9px;}
  .sw b{font-size:10.5px;font-weight:700;}
  .sw span{font-size:9px;opacity:.85;font-family:var(--font-mono);}
  .key{margin-top:14px;display:flex;gap:20px;flex-wrap:wrap;font-size:12px;color:var(--text-muted);}
  .key b{color:var(--text-strong);}
</style></head><body>
  <div class="scale">
    <div class="sw" style="background:var(--ink-900)"><b style="color:#fff">900</b><span style="color:#C2C7BF">ink</span></div>
    <div class="sw" style="background:var(--ink-700)"><b style="color:#fff">700</b><span style="color:#DCE0D6">body</span></div>
    <div class="sw" style="background:var(--ink-600)"><b style="color:#fff">600</b><span style="color:#fff">muted</span></div>
    <div class="sw" style="background:var(--ink-500)"><b style="color:#fff">500</b><span style="color:#fff">faint</span></div>
    <div class="sw" style="background:var(--ink-400)"><b style="color:#fff">400</b><span style="color:#fff">place</span></div>
    <div class="sw" style="background:var(--ink-300)"><b style="color:#16241D">300</b><span style="color:#3E463F">b-str</span></div>
    <div class="sw" style="background:var(--ink-200)"><b style="color:#16241D">200</b><span style="color:#3E463F">border</span></div>
    <div class="sw" style="background:var(--ink-100)"><b style="color:#16241D">100</b><span style="color:#3E463F">sunken</span></div>
    <div class="sw" style="background:var(--paper)"><b style="color:#16241D">paper</b><span style="color:#3E463F">#F6F4EE</span></div>
    <div class="sw" style="background:var(--paper-2);border-left:1px solid var(--border-subtle)"><b style="color:#16241D">card</b><span style="color:#3E463F">#FCFBF7</span></div>
  </div>
  <div class="key"><span><b>900</b> strong text</span><span><b>700</b> body</span><span><b>600/500</b> muted/faint</span><span><b>200</b> borders</span><span><b>paper</b> page bg</span></div>
</body></html>
