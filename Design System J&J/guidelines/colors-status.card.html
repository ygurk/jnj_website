<!-- @dsCard group="Colors" viewport="700x180" name="Status colors" subtitle="Success, warning, danger, info — tuned to the warm palette" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);padding:24px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .st{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-default);}
  .st .bar{height:54px;display:flex;align-items:center;padding:0 14px;color:#fff;font-weight:700;font-size:13px;}
  .st .soft{padding:10px 14px;font-size:11.5px;}
  .st .soft b{display:block;font-family:var(--font-mono);font-size:10.5px;font-weight:600;}
</style></head><body>
  <div class="grid">
    <div class="st"><div class="bar" style="background:var(--success-600)">Success</div><div class="soft" style="background:var(--success-100);color:#1F4D3D"><b>#2E6B52</b>on 100 tint</div></div>
    <div class="st"><div class="bar" style="background:var(--warning-600)">Warning</div><div class="soft" style="background:var(--warning-100);color:#7a5510"><b>#C8881F</b>on 100 tint</div></div>
    <div class="st"><div class="bar" style="background:var(--danger-600)">Danger</div><div class="soft" style="background:var(--danger-100);color:#9E3B23"><b>#BF4A2C</b>on 100 tint</div></div>
    <div class="st"><div class="bar" style="background:var(--info-600)">Info</div><div class="soft" style="background:var(--info-100);color:#1f4f59"><b>#2E6B7A</b>on 100 tint</div></div>
  </div>
</body></html>
