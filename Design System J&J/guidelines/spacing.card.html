<!-- @dsCard group="Spacing" viewport="700x210" name="Spacing scale" subtitle="4px base grid — space-1 through space-16" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);padding:26px 30px;}
  .row{display:flex;align-items:center;gap:14px;padding:5px 0;}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:96px;flex:none;}
  .lbl b{color:var(--text-strong);font-weight:600;}
  .bar{height:16px;background:var(--green-300);border-radius:3px;}
</style></head><body>
  <div class="row"><span class="lbl"><b>1</b> · 4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="lbl"><b>2</b> · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="lbl"><b>3</b> · 12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="lbl"><b>4</b> · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="lbl"><b>6</b> · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="lbl"><b>8</b> · 32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="lbl"><b>12</b> · 48px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="lbl"><b>16</b> · 64px</span><div class="bar" style="width:64px"></div></div>
</body></html>
