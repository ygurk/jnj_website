<!-- @dsCard group="Type" viewport="700x340" name="Type scale" subtitle="Display → overline, with role & font" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);padding:26px 30px;}
  .row{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--border-subtle);}
  .row:last-child{border-bottom:none;}
  .spec{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);width:120px;flex:none;}
  .spec b{color:var(--text-body);font-weight:600;}
  .samp{color:var(--text-strong);}
  .serif{font-family:var(--font-serif);font-weight:500;letter-spacing:-.02em;}
  .sans{font-family:var(--font-sans);}
</style></head><body>
  <div class="row"><span class="spec"><b>Display</b> 56/serif</span><span class="samp serif" style="font-size:42px">Earn the call</span></div>
  <div class="row"><span class="spec"><b>H1</b> 44/serif</span><span class="samp serif" style="font-size:34px">Page title</span></div>
  <div class="row"><span class="spec"><b>H2</b> 34/serif</span><span class="samp serif" style="font-size:28px">Section title</span></div>
  <div class="row"><span class="spec"><b>H3</b> 24/sans 600</span><span class="samp sans" style="font-size:22px;font-weight:600">Subsection heading</span></div>
  <div class="row"><span class="spec"><b>H4</b> 20/sans 600</span><span class="samp sans" style="font-size:19px;font-weight:600">Card title</span></div>
  <div class="row"><span class="spec"><b>Body</b> 17/sans</span><span class="samp sans" style="font-size:17px;color:var(--text-body)">Default paragraph text for everything.</span></div>
  <div class="row"><span class="spec"><b>Small</b> 15/sans</span><span class="samp sans" style="font-size:15px;color:var(--text-muted)">Secondary &amp; dense UI</span></div>
  <div class="row"><span class="spec"><b>Caption</b> 13/sans</span><span class="samp sans" style="font-size:13px;color:var(--text-muted)">Helper text, captions</span></div>
  <div class="row"><span class="spec"><b>Overline</b> 12/caps</span><span class="samp sans jj-eyebrow" style="font-size:12px">Eyebrow label</span></div>
</body></html>
