<!-- @dsCard group="Spacing" viewport="700x180" name="Corner radii" subtitle="xs 4 → 2xl 28 → pill. Cards use lg (14px)" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);padding:26px 30px;display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:9px;}
  .box{width:74px;height:64px;background:var(--green-100);border:1.5px solid var(--green-600);}
  .item span{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
  .item b{color:var(--text-strong);font-weight:600;}
</style></head><body>
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span><b>xs</b> 4</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span><b>sm</b> 6</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span><b>md</b> 10</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span><b>lg</b> 14</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span><b>xl</b> 20</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><span><b>2xl</b> 28</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:64px"></div><span><b>pill</b></span></div>
</body></html>
